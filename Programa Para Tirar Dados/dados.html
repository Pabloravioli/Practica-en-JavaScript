<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Document</title>
</head>
<body class=" min-h-screen flex justify-center items-center">

    <main class=" flex flex-col bg-gray-100 border rounded-3xl shadow-xl gap-4 "> 
    
    <h1 class="text-4xl text-center pt-4">Dice roller</h1>   
    <div class="flex justify-center">
        <img src="imagenes/dados.svg" alt="Dados" class="w-16">
    </div>
    

    <label for="cantidadDeDados" class="text-2xl text-center p-4">Seleccione la cantidad de dados</label>
    <div class="flex justify-center">
    <input class="text-center rounded-xl w-32" type="number" min="1" value="1" max="6" id="cantidadDeDados">
    </div>

    <div class="flex justify-center">
        <button class="bg-gray-300 rounded-md text-xl p-1" onclick="tirarDados()">Tirar dados</button>
    </div>
        <div id="dadoResultado" class="text-xl text-center"></div>
        <div id="dadoImagen"  class="grid grid-cols-3 gap-4 justify-items-center pb-4"></div>

    </main>



    <script src="dados.js"></script>
</body>
</html>
