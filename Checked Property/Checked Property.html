<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <script src="https://cdn.tailwindcss.com"></script>
    <title>Document</title>
</head>
<body class="min-h-screen flex items-center justify-center bg-gray-100 font-sans">

  <div class="bg-white p-8 rounded-2xl shadow-lg w-80 space-y-6">

    <!-- Checkbox -->
    <div class="flex items-center gap-3">
      <input type="checkbox" id="myCheckBox" class="w-5 h-5 accent-blue-600">
      <label for="myCheckBox" class="text-gray-700 font-medium">
        Suscríbete
      </label>
    </div>

    <!-- Radios -->
    <div class="space-y-3">
      <p class="font-semibold text-gray-800">Método de pago</p>

      <div class="flex items-center gap-3">
        <input type="radio" id="visaBtn" name="card" class="w-4 h-4 accent-blue-600">
        <label for="visaBtn">Visa</label>
      </div>

      <div class="flex items-center gap-3">
        <input type="radio" id="masterCardBtn" name="card" class="w-4 h-4 accent-blue-600">
        <label for="masterCardBtn">MasterCard</label>
      </div>

      <div class="flex items-center gap-3">
        <input type="radio" id="payPalBtn" name="card" class="w-4 h-4 accent-blue-600">
        <label for="payPalBtn">PayPal</label>
      </div>
    </div>

    <!-- Botón -->
    <button 
      type="submit" 
      id="mySubmit"
      class="w-full bg-blue-600 text-white py-2 rounded-lg shadow-md hover:bg-blue-700 active:scale-95 transition"
    >
      Aceptar
    </button>

    <!-- Resultados -->
    <div class="text-sm text-gray-700 space-y-1">
      <p id="subResult"></p>
      <p id="paymentResult"></p>
    </div>

  </div>

  <script src="Checked Property.js"></script>

</body>
</html>
